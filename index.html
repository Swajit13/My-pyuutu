<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Arushi ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
    overflow: hidden;
}

/* FULLSCREEN SECTIONS */
.section {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    opacity: 0;
    transition: 1s;
}

.active {
    opacity: 1;
    z-index: 1;
}

/* CINEMATIC BACKGROUND */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, #ff758c, #ff7eb3);
    animation: bgMove 10s infinite alternate;
    z-index: -1;
}

@keyframes bgMove {
    0% {filter: brightness(0.8);}
    100% {filter: brightness(1.2);}
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
}

/* TEXT */
h1 { font-size: 2rem; }
p { font-size: 1rem; max-width: 300px; }

/* TYPE TEXT */
#text {
    min-height: 120px;
}

/* NO BUTTON ESCAPE */
#noBtn {
    position: relative;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- INTRO -->
<div class="section active" id="intro">
    <h1>✨ A Special Message ✨</h1>
    <p>Put on your headphones... and tap below</p>
    <button onclick="start()">Start 🎬</button>
</div>

<!-- SCENE 1 -->
<div class="section" id="scene1">
    <h1>Hey Arushi ❤️</h1>
    <p>I made something just for you...</p>
    <button onclick="next('scene2')">Continue 💖</button>
</div>

<!-- SCENE 2 -->
<div class="section" id="scene2">
    <h1>🎁 Surprise</h1>
    <p>Close your eyes for a second... then tap</p>
    <button onclick="startLetter()">Open 💌</button>
</div>

<!-- LETTER -->
<div class="section" id="letter">
    <h1>For You 💖</h1>
    <div id="text"></div>
    <button onclick="next('game')">Next ➡️</button>
</div>

<!-- GAME -->
<div class="section" id="game">
    <h1>Do you love me? 😏</h1>
    <button onclick="yes()">Yes 💖</button>
    <button id="noBtn">No 😈</button>
</div>

<!-- FINAL -->
<div class="section" id="final">
    <h1>I love you, wifey ❤️💍</h1>
    <p>You are my forever 😭💖</p>
</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>
function next(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function start(){
    document.getElementById("music").play();
    next('scene1');
}

// typing message
const msg = `Hey Arushi 💖

From the moment you came into my life,
everything changed...

Your smile makes my day 😊
Your voice feels like peace 💫

I may not be perfect,
but my love for you is true ❤️

— Yours forever, Swajit 💌`;

let i = 0;

function startLetter(){
    next('letter');
    type();
}

function type(){
    if(i < msg.length){
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type, 35);
    }
}

// game
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", ()=>{
    noBtn.style.transform = `translate(${Math.random()*200}px, ${Math.random()*200}px)`;
});

function yes(){
    next('final');
}
</script>

</body>
</html>
